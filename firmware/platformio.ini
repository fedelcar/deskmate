; Deskmate — Waveshare ESP32-S3-Touch-AMOLED-1.75
[env:deskmate]
platform    = espressif32
board       = esp32-s3-devkitc-1
framework   = arduino

monitor_speed = 115200
upload_speed  = 921600

; PSRAM (OPI mode for ESP32-S3 with 8 MB Octal PSRAM)
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi

; Large partition to fit LVGL + fonts
board_build.partitions = huge_app.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LVGL config file lives in src/
    -DLV_CONF_INCLUDE_SIMPLE
    -I src
    ; Bump stack for HTTP + JSON tasks
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=16384

lib_deps =
    ; GFX library — Waveshare fork adds CO5300 QSPI support
    https://github.com/moononournation/Arduino_GFX.git#v1.4.7
    ; LVGL v8 (stable, widely supported)
    lvgl/lvgl @ ^8.3.11
    ; JSON parsing
    bblanchon/ArduinoJson @ ^7.0.0
